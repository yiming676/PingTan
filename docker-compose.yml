services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pingtan}
      POSTGRES_USER: ${POSTGRES_USER:-pingtan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pingtan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pingtan}:${POSTGRES_PASSWORD:-pingtan}@postgres:5432/${POSTGRES_DB:-pingtan}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-to-a-long-random-secret}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-5242880}
      INIT_ADMIN_PHONE: ${INIT_ADMIN_PHONE:-15359150175}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-change-me}
      INIT_ADMIN_NAME: ${INIT_ADMIN_NAME:-System Admin}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
