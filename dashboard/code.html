<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com" rel="preconnect"/>

            darkMode: "class",

                    colors: {
                        "primary": "#2d7670",

        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;

        }

            -webkit-backdrop-filter: blur(12px);

<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 font-display transition-colors duration-200">
<div class="relative min-h-screen w-full flex flex-col pb-24 max-w-md mx-auto overflow-x-hidden shadow-2xl bg-[#f9fafb] dark:bg-[#192438]">
<header class="flex items-center justify-between px-6 pt-12 pb-4 sticky top-0 z-20 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm">

</div>

<span class="absolute top-2 right-2 h-2.5 w-2.5 rounded-full bg-red-500 border-2 border-white dark:border-background-dark"></span>

<p class="text-primary font-medium text-sm flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[18px]">wb_sunny</span>

</p>
</div>
<div class="h-16 w-16 rounded-full bg-slate-200 border-2 border-white dark:border-slate-700 shadow-sm overflow-hidden relative">

</div>

<div class="h-10 w-10 rounded-full bg-teal-50 dark:bg-teal-500/20 flex items-center justify-center text-teal-600 dark:text-teal-300">
<span class="material-symbols-outlined">campaign</span>
</div>
<div class="text-left">
<span class="block text-base font-bold text-slate-900 dark:text-white leading-tight">通知公告</span>
<span class="text-xs text-slate-400 font-medium mt-0.5 block">2条新消息</span>
</div>

</div>

</main>

<div class="flex justify-around items-center h-16 max-w-md mx-auto px-2">

</button>
<button class="flex flex-col items-center justify-center w-full gap-1 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
