                        欢迎回来，请登录您的教职工账户

<form class="flex flex-col gap-5">
<!-- Teacher ID Input -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-text-main dark:text-gray-300 uppercase tracking-wider ml-1">

<div class="relative flex items-center group">
<span class="absolute left-4 text-text-muted dark:text-gray-500 group-focus-within:text-primary transition-colors material-symbols-outlined">
                            badge
                        </span>
<input class="w-full h-12 pl-11 pr-4 bg-background-light dark:bg-background-dark border border-transparent dark:border-gray-700 rounded-xl focus:bg-white dark:focus:bg-gray-800 focus:border-primary focus:ring-0 transition-all outline-none text-text-main dark:text-white placeholder:text-gray-400 font-medium" placeholder="请输入教职工号" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-text-main dark:text-gray-300 uppercase tracking-wider ml-1">
                        密码
                    </label>
<div class="relative flex items-center group">
<span class="absolute left-4 text-text-muted dark:text-gray-500 group-focus-within:text-primary transition-colors material-symbols-outlined">
                            lock
                        </span>
<input class="w-full h-12 pl-11 pr-12 bg-background-light dark:bg-background-dark border border-transparent dark:border-gray-700 rounded-xl focus:bg-white dark:focus:bg-gray-800 focus:border-primary focus:ring-0 transition-all outline-none text-text-main dark:text-white placeholder:text-gray-400 font-medium" placeholder="请输入密码" type="password"/>
<button class="absolute right-0 top-0 bottom-0 px-4 flex items-center justify-center text-text-muted hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Utility Row: Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-1">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 transition-all checked:border-primary checked:bg-primary hover:border-primary focus:ring-2 focus:ring-primary/20" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-[14px] opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity">
                                check
                            </span>
</div>
<span class="text-sm text-text-muted dark:text-gray-400 group-hover:text-primary transition-colors">记住我</span>
</label>
<a class="text-sm font-semibold text-primary hover:text-primary-dark dark:hover:text-emerald-400 transition-colors" href="#">
                        忘记密码?
                    </a>
</div>

<button class="mt-4 w-full h-12 bg-primary hover:bg-primary-dark text-white rounded-xl font-bold text-base shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:-translate-y-0.5 active:translate-y-0 active:shadow-sm transition-all duration-200 flex items-center justify-center gap-2">
